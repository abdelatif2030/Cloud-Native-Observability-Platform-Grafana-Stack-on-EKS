deploymentMode: SingleBinary

singleBinary:
  replicas: 1

loki:
  auth_enabled: false

  limits_config:
    allow_structured_metadata: false

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: boltdb-shipper
        object_store: filesystem
        schema: v12
        index:
          prefix: index_
          period: 24h

  storage:
    type: filesystem

persistence:
  enabled: false